<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hub-zero</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #2a2a2a;
      --accent: #7c3aed;
      --accent-glow: rgba(124, 58, 237, 0.35);
      --text: #e8e8e8;
      --muted: #6b6b6b;
      --bar-h: 52px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      height: var(--bar-h);
      padding: 0 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    #logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
      white-space: nowrap;
      user-select: none;
      text-shadow: 0 0 14px var(--accent-glow);
    }

    #nav-btns {
      display: flex;
      gap: 4px;
    }

    #nav-btns button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, border-color .15s, background .15s;
    }
    #nav-btns button:hover { color: var(--text); border-color: #444; background: #1e1e1e; }
    #nav-btns button:active { background: #222; }

    #url-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      height: 36px;
      gap: 8px;
      transition: border-color .15s, box-shadow .15s;
    }
    #url-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #lock-icon { color: var(--muted); font-size: 12px; flex-shrink: 0; }

    #url-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      caret-color: var(--accent);
    }
    #url-input::placeholder { color: var(--muted); }

    #go-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 0 14px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s, box-shadow .15s;
      box-shadow: 0 0 10px var(--accent-glow);
    }
    #go-btn:hover { opacity: .88; }
    #go-btn:active { opacity: .75; }

    /* ── Loading bar ── */
    #progress {
      position: fixed;
      top: var(--bar-h);
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .25s ease;
      z-index: 20;
      display: none;
    }
    #progress.active { display: block; }

    /* ── Viewport ── */
    #viewport {
      position: fixed;
      top: var(--bar-h);
      left: 0; right: 0; bottom: 0;
    }

    /* ── Landing page (shown before any URL loaded) ── */
    #landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      animation: fadeIn .4s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    #landing h1 {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #landing p { color: var(--muted); font-size: 15px; }
    #landing .hint {
      margin-top: 8px;
      font-size: 13px;
      color: #333;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
    }

    /* ── Proxy iframe ── */
    #proxy-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #fff;
    }

    /* ── Status toast ── */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1e1e1e;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 9px 18px;
      border-radius: 20px;
      transition: transform .25s ease, opacity .25s ease;
      opacity: 0;
      z-index: 100;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span id="logo">hub-zero</span>

  <div id="nav-btns">
    <button id="btn-back" title="Back" onclick="goBack()">&#8592;</button>
    <button id="btn-fwd"  title="Forward" onclick="goForward()">&#8594;</button>
    <button id="btn-reload" title="Reload" onclick="reload()">&#8635;</button>
    <button id="btn-home" title="Home" onclick="goHome()">&#8962;</button>
  </div>

  <div id="url-wrap">
    <span id="lock-icon">🔒</span>
    <input id="url-input" type="text" placeholder="Enter a URL to proxy  (e.g. https://example.com)" autocomplete="off" spellcheck="false" />
  </div>

  <button id="go-btn" onclick="navigate()">Go</button>
</div>

<!-- Loading bar -->
<div id="progress"></div>

<!-- Content area -->
<div id="viewport">
  <div id="landing">
    <h1>hub-zero</h1>
    <p>Your personal web proxy. Enter any URL above to get started.</p>
    <div class="hint">All traffic routed through your Cloudflare Worker → no logs, no limits.</div>
  </div>
  <iframe id="proxy-frame" sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-downloads"></iframe>
</div>

<div id="toast" id="toast"></div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  // Replace this with your actual Cloudflare Worker URL after deploying
  const WORKER_URL = "https://hub-zero-proxy.xylos000.workers.dev";

  // ── State ──────────────────────────────────────────────────────────────────
  let history_stack = [];
  let history_index = -1;
  let loading = false;

  const input    = document.getElementById("url-input");
  const frame    = document.getElementById("proxy-frame");
  const landing  = document.getElementById("landing");
  const progress = document.getElementById("progress");
  const toast    = document.getElementById("toast");

  // ── URL input: press Enter to navigate ─────────────────────────────────────
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") navigate();
  });

  // ── Navigate ────────────────────────────────────────────────────────────────
  function navigate(rawUrl) {
    rawUrl = rawUrl || input.value.trim();
    if (!rawUrl) return;

    // Auto-prepend https if missing
    if (!/^https?:\/\//i.test(rawUrl)) rawUrl = "https://" + rawUrl;

    input.value = rawUrl;
    loadURL(rawUrl);
  }

  function loadURL(url) {
    if (loading) return;
    loading = true;

    const proxyURL = WORKER_URL + "/proxy?url=" + encodeURIComponent(url);

    // Push to history
    history_stack = history_stack.slice(0, history_index + 1);
    history_stack.push(url);
    history_index++;
    updateNavBtns();

    // Show progress
    startProgress();

    // Show frame, hide landing
    landing.style.display = "none";
    frame.style.display   = "block";

    // Load
    frame.onload = () => {
      stopProgress();
      loading = false;
      showToast("Loaded ✓");
    };
    frame.onerror = () => {
      stopProgress();
      loading = false;
      showToast("Load failed ✗");
    };

    frame.src = proxyURL;
    input.value = url;
  }

  // ── Nav buttons ─────────────────────────────────────────────────────────────
  function goBack() {
    if (history_index > 0) {
      history_index--;
      loadURLNoHistory(history_stack[history_index]);
    }
  }
  function goForward() {
    if (history_index < history_stack.length - 1) {
      history_index++;
      loadURLNoHistory(history_stack[history_index]);
    }
  }
  function reload() {
    if (history_stack[history_index]) loadURLNoHistory(history_stack[history_index]);
  }
  function goHome() {
    frame.style.display = "none";
    landing.style.display = "flex";
    input.value = "";
  }

  function loadURLNoHistory(url) {
    if (!url) return;
    loading = true;
    input.value = url;
    startProgress();
    frame.onload = () => { stopProgress(); loading = false; };
    frame.src = WORKER_URL + "/proxy?url=" + encodeURIComponent(url);
  }

  function updateNavBtns() {
    document.getElementById("btn-back").disabled  = history_index <= 0;
    document.getElementById("btn-fwd").disabled   = history_index >= history_stack.length - 1;
  }

  // ── Listen for messages from inside the iframe ──────────────────────────────
  window.addEventListener("message", e => {
    if (!e.data || typeof e.data !== "object") return;

    if (e.data.type === "hub-zero-nav") {
      // The proxied page navigated — extract the original URL from the proxy URL
      try {
        const inner = new URL(e.data.url);
        const original = inner.searchParams.get("url") || inner.searchParams.get("url");
        if (original) input.value = decodeURIComponent(original);
      } catch {}
    }

    if (e.data.type === "hub-zero-ready") {
      const title = e.data.title;
      if (title) document.title = title + " — hub-zero";
    }
  });

  // ── Progress bar ────────────────────────────────────────────────────────────
  let progressTimer;
  function startProgress() {
    progress.classList.add("active");
    progress.style.transform = "scaleX(0)";
    let p = 0;
    clearInterval(progressTimer);
    progressTimer = setInterval(() => {
      p = Math.min(p + Math.random() * 0.08, 0.9);
      progress.style.transform = "scaleX(" + p + ")";
    }, 120);
  }
  function stopProgress() {
    clearInterval(progressTimer);
    progress.style.transform = "scaleX(1)";
    progress.style.transition = "transform .15s ease";
    setTimeout(() => {
      progress.classList.remove("active");
      progress.style.transform = "scaleX(0)";
      progress.style.transition = "transform .25s ease";
    }, 300);
  }

  // ── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2000);
  }

  // ── Auto-load on startup (optional) ────────────────────────────────────────
  // Uncomment + set a URL to auto-proxy a page when hub-zero.site loads:
  // window.addEventListener("load", () => navigate("https://example.com"));
</script>
</body>
</html>
