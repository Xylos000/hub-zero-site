<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hub Zero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ══ TOKENS ══ */
:root {
  --void:    #03020a;
  --deep:    #07060f;
  --surface: #0c0918;
  --raised:  #131022;
  --card:    #17132b;
  --border:  rgba(255,255,255,0.07);
  --glow:    rgba(160,80,255,0.22);
  --text:    #ede8ff;
  --muted:   #7e7299;
  --faint:   #352f50;
  --accent:  #a855f7;
  --accent2: #7c3aed;
  --pink:    #ec4899;
  --gold:    #f5c518;
  --teal:    #2dd4bf;
  --green:   #34d399;
  --red:     #f87171;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--void);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.65;
  min-height:100vh;overflow-x:hidden;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.45;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
}
.blob{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0;opacity:.13;animation:bd 22s ease-in-out infinite}
.b1{width:640px;height:640px;background:#7c3aed;top:-200px;left:-180px}
.b2{width:500px;height:500px;background:#ec4899;bottom:-160px;right:-150px;animation-delay:-8s}
.b3{width:380px;height:380px;background:#2563eb;top:45%;left:55%;transform:translate(-50%,-50%);animation-delay:-16s}
@keyframes bd{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(24px,-17px) scale(1.04)}66%{transform:translate(-17px,27px) scale(.96)}}
.b3{animation:bd3 22s ease-in-out infinite}
@keyframes bd3{0%,100%{transform:translate(-50%,-50%) scale(1)}33%{transform:translate(calc(-50% + 20px),calc(-50% - 14px)) scale(1.04)}66%{transform:translate(calc(-50% - 14px),calc(-50% + 22px)) scale(.97)}}
#app{position:relative;z-index:1}

/* ══ SHARED ══ */
.pw{max-width:1140px;margin:0 auto;padding:0 24px 80px}
.logo-mark{display:inline-flex;align-items:baseline;gap:1px;cursor:pointer;text-decoration:none}
.lv{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.03em;line-height:1;background:linear-gradient(135deg,#d8b4fe,#f9a8d4);-webkit-background-clip:text;background-clip:text;color:transparent}
.ls{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.03em;line-height:1;color:var(--text)}
.ld{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);margin-left:3px;margin-bottom:3px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:.67rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:999px;white-space:nowrap}
.bm{background:rgba(245,197,24,.09);color:var(--gold);border:1px solid rgba(245,197,24,.18)}
.bt{background:rgba(45,212,191,.09);color:var(--teal);border:1px solid rgba(45,212,191,.18)}
.bo{background:rgba(148,163,184,.09);color:#94a3b8;border:1px solid rgba(148,163,184,.18)}
.br{background:rgba(245,197,24,.07);color:var(--gold);border:1px solid rgba(245,197,24,.13)}
.be{background:rgba(168,85,247,.11);color:var(--accent);border:1px solid rgba(168,85,247,.2)}
.btn{display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;letter-spacing:.01em;border:none;border-radius:10px;cursor:pointer;transition:all .17s;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;padding:10px 20px;box-shadow:0 4px 18px rgba(124,58,237,.33)}
.btn-p:hover{box-shadow:0 6px 28px rgba(168,85,247,.5);transform:translateY(-1px)}
.btn-g{background:var(--raised);color:var(--text);border:1px solid var(--border);padding:9px 16px}
.btn-g:hover{border-color:var(--glow);background:var(--card)}
.btn-sm{font-size:.8rem;padding:7px 14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:99px}
.spin{width:16px;height:16px;border:2px solid var(--faint);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--muted);font-size:.82rem;font-family:'DM Mono',monospace}
.err-box{padding:18px 20px;border:1px solid rgba(248,113,113,.2);border-radius:12px;background:rgba(248,113,113,.04);color:var(--red);font-size:.83rem;font-family:'DM Mono',monospace;line-height:1.6}
.sec-label{font-family:'DM Mono',monospace;font-size:.69rem;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ══ SEARCH PAGE ══ */
.site-header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 32px;border-bottom:1px solid var(--border);margin-bottom:52px;flex-wrap:wrap;gap:20px}
.header-nav{display:flex;align-items:center;gap:16px;margin-left:auto}
.nav-link{color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:500;padding:8px 14px;border-radius:8px;transition:all .2s;border:1px solid transparent;cursor:pointer}
.nav-link:hover{color:var(--text);border-color:var(--accent)}
.nav-link.active{background:rgba(168,85,247,.1);color:var(--text);border-color:var(--accent)}
.hpill{font-family:'DM Mono',monospace;font-size:.69rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--border);padding:5px 12px;border-radius:999px;background:var(--surface)}
.hero-h{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,6vw,5.2rem);line-height:.93;letter-spacing:.02em;margin-bottom:14px}
.hero-h .g{background:linear-gradient(100deg,#c084fc,#f472b6 50%,#fb923c);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-sub{color:var(--muted);font-size:.93rem;max-width:500px;margin-bottom:32px;line-height:1.72}
.sf{display:flex;align-items:center;gap:12px;background:var(--raised);border:1px solid var(--border);border-radius:16px;padding:13px 18px;transition:border-color .2s,box-shadow .2s;position:relative}
.sf::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(120deg,rgba(168,85,247,.04),transparent);pointer-events:none}
.sf:focus-within{border-color:var(--glow);box-shadow:0 0 0 3px rgba(168,85,247,.1),0 8px 30px rgba(0,0,0,.4)}
.si{color:var(--muted);flex-shrink:0;width:17px;height:17px}
.sinput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500}
.sinput::placeholder{color:var(--faint)}
.sf-foot{display:flex;align-items:center;gap:8px;margin-top:11px;padding:0 4px;min-height:20px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 7px var(--accent);opacity:0;flex-shrink:0;transition:opacity .2s}
.sdot.on{opacity:1;animation:pu 1.1s ease-in-out infinite}
@keyframes pu{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.65);opacity:.3}}
.stxt{font-size:.78rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.04em}
.scnt{font-size:.75rem;color:var(--faint);font-family:'DM Mono',monospace;margin-left:auto}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.chip{font-family:'DM Sans',sans-serif;font-size:.81rem;font-weight:500;padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .17s}
.chip:hover{border-color:var(--glow);color:var(--text);background:var(--raised);transform:translateY(-1px)}
.rlist{display:flex;flex-direction:column;gap:2px}
.empty-s{text-align:center;padding:72px 20px;color:var(--faint);font-family:'DM Mono',monospace;font-size:.79rem;letter-spacing:.04em}
.ei{font-size:2.2rem;margin-bottom:10px;opacity:.35}
.rcard{display:grid;grid-template-columns:80px 1fr auto;gap:18px;align-items:start;padding:16px 18px;border-radius:14px;border:1px solid transparent;background:transparent;cursor:pointer;transition:all .18s;position:relative;animation:fu .28s ease both}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rcard:hover{background:var(--raised);border-color:var(--border)}
.rcard::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%) scaleY(0);width:2px;height:56%;background:linear-gradient(180deg,var(--accent),var(--pink));border-radius:2px;transition:transform .18s}
.rcard:hover::before{transform:translateY(-50%) scaleY(1)}
.rp{width:80px;aspect-ratio:2/3;border-radius:8px;object-fit:cover;border:1px solid var(--border);background:var(--raised);flex-shrink:0}
.rpf{width:80px;aspect-ratio:2/3;border-radius:8px;background:var(--raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--faint);flex-shrink:0}
.rb{min-width:0}
.rm{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.ry{font-family:'DM Mono',monospace;font-size:.71rem;color:var(--faint)}
.rt{font-family:'Bebas Neue',sans-serif;font-size:1.43rem;letter-spacing:.03em;line-height:1.05;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ro{font-size:.82rem;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rs{display:flex;flex-direction:column;align-items:flex-end;gap:9px;padding-top:3px}
.rid{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--faint)}
.rcta{opacity:.8;transform:translateX(3px);transition:opacity .18s,transform .18s}
.rcard:hover .rcta{opacity:1;transform:translateX(0)}
.site-footer{border-top:1px solid var(--border);margin-top:48px;padding:24px 0;font-family:'DM Mono',monospace;font-size:.68rem;color:var(--faint);letter-spacing:.06em;text-align:center}
.footer-credit{margin-bottom:16px}© Hub Zero — Made by Xylos & C2

/* ══ DEVS PAGE ══ */
.devs-page{min-height:100vh;padding-bottom:60px}
.devs-hero{text-align:center;padding:64px 24px 48px;background:linear-gradient(135deg,rgba(168,85,247,.1),rgba(236,72,153,.08));border-bottom:1px solid var(--border);margin-bottom:64px}
.devs-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,6vw,4.5rem);letter-spacing:.03em;margin-bottom:16px;background:linear-gradient(120deg,var(--accent),var(--pink),var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent}
.devs-subtitle{color:var(--muted);font-size:.95rem;max-width:600px;margin:0 auto 24px;line-height:1.7}
.devs-cta{display:inline-flex;gap:8px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;transition:all .2s;border:none;cursor:pointer}
.devs-cta:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(168,85,247,.3)}
.devs-grid{max-width:1100px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:32px}
.dev-card{background:linear-gradient(135deg,rgba(19,16,34,.6),rgba(12,9,24,.8));border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;transition:all .3s;position:relative;overflow:hidden}
.dev-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(168,85,247,.05),rgba(236,72,153,.02));opacity:0;transition:opacity .3s;pointer-events:none}
.dev-card:hover{border-color:var(--accent);transform:translateY(-8px);box-shadow:0 20px 60px rgba(168,85,247,.2)}
.dev-card:hover::before{opacity:1}
.dev-avatar{width:120px;height:120px;margin:0 auto 24px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:3.5rem;border:3px solid var(--border);position:relative;z-index:1}
.dev-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.02em;margin-bottom:12px;background:linear-gradient(120deg,var(--text),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;position:relative;z-index:1}
.dev-title{color:var(--accent);font-weight:600;font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px;position:relative;z-index:1}
.dev-roles{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;position:relative;z-index:1}
.role-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(168,85,247,.08);border-radius:8px;border:1px solid rgba(168,85,247,.15)}
.role-item::before{content:'⚡';color:var(--accent);font-size:.9rem;flex-shrink:0}
.role-text{color:var(--muted);font-size:.85rem}
.dev-bio{color:var(--muted);line-height:1.7;font-size:.9rem;margin-bottom:24px;position:relative;z-index:1}
.dev-socials{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}
.social-btn{width:40px;height:40px;border-radius:8px;background:var(--raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none;transition:all .2s;font-size:1.1rem}
.social-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-2px)}
.dev-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px;padding-top:24px;border-top:1px solid var(--border);position:relative;z-index:1}
.stat{display:flex;flex-direction:column;align-items:center}
.stat-num{font-weight:700;font-size:1.3rem;color:var(--accent)}
.stat-label{font-size:.7rem;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
.dev-separator{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:40px 0}
.stack-section{max-width:1100px;margin:0 auto;padding:0 24px 48px;text-align:center}
.stack-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;margin-bottom:24px;color:var(--text)}
.stack-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.stack-badge{padding:8px 16px;background:var(--raised);border:1px solid var(--border);border-radius:8px;font-size:.8rem;color:var(--muted);transition:all .2s}
.stack-badge:hover{background:rgba(168,85,247,.1);border-color:var(--accent);color:var(--text)}

/* ══ INFO PAGE ══ */
.info-page{min-height:100vh}
.info-hero{position:relative;width:100%;min-height:480px;display:flex;align-items:flex-end;overflow:hidden}
.info-bd{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:saturate(1.1) brightness(.5)}
.info-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(3,2,10,.05) 0%,rgba(3,2,10,.25) 35%,rgba(3,2,10,.82) 70%,var(--void) 100%)}
.info-hc{position:relative;z-index:1;width:100%;max-width:1140px;margin:0 auto;padding:0 24px 44px;display:flex;gap:28px;align-items:flex-end}
.info-pw{flex-shrink:0;width:160px}
.info-poster{width:160px;aspect-ratio:2/3;border-radius:14px;object-fit:cover;border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 50px rgba(0,0,0,.6)}
.info-pf{width:160px;aspect-ratio:2/3;border-radius:14px;background:var(--raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--faint)}
.info-txt{flex:1;min-width:0}
.info-mr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.info-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,5vw,4rem);line-height:.93;letter-spacing:.03em;margin-bottom:12px}
.info-ov{font-size:.9rem;color:rgba(237,232,255,.73);line-height:1.73;max-width:620px;margin-bottom:20px;display:-webkit-box;-webkit-line-clamp:4;line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.info-acts{display:flex;gap:10px;flex-wrap:wrap}
.info-body{max-width:1140px;margin:0 auto;padding:0 24px 80px}
.ssection{margin-top:44px}
.spicker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px}
.sbtn{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.07em;padding:7px 16px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.sbtn.active{background:var(--raised);border-color:var(--glow);color:var(--text)}
.sbtn:hover:not(.active){color:var(--text);background:var(--surface)}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ep-card{background:var(--raised);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .17s;display:flex;flex-direction:column}
.ep-card:hover{border-color:var(--glow);transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,0,0,.4)}
.ep-still{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--card)}
.ep-still-fb{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--raised),var(--card));display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:var(--faint)}
.ep-cb{padding:12px 14px 14px;flex:1;display:flex;flex-direction:column;gap:3px}
.ep-num{font-family:'DM Mono',monospace;font-size:.67rem;letter-spacing:.08em;color:var(--accent)}
.ep-ttl{font-weight:600;font-size:.9rem;color:var(--text)}
.ep-ov{font-size:.77rem;color:var(--muted);line-height:1.5;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.ep-ft{display:flex;align-items:center;gap:6px;margin-top:10px}

/* ══ PLAYER PAGE ══ */
.player-page{min-height:100vh;background:radial-gradient(circle at top left,rgba(168,85,247,.18),transparent 30%),radial-gradient(circle at top right,rgba(236,72,153,.12),transparent 28%),linear-gradient(180deg,#05040b 0%,#090710 24%,#03020a 100%)}
.pbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px 24px;border-bottom:1px solid var(--border);background:rgba(3,2,10,.75);backdrop-filter:blur(18px);position:sticky;top:0;z-index:20}
.pbar-l{display:flex;align-items:center;gap:14px;min-width:0;flex:1}
.pbar-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pnow{display:flex;flex-direction:column;gap:4px;min-width:0}
.pnow strong{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:.04em;line-height:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pnow span{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmain{max-width:1440px;margin:0 auto;padding:28px 24px 40px;display:grid;grid-template-columns:minmax(0,1fr);gap:22px;align-items:start}
.pmain.movie-only{grid-template-columns:minmax(0,1fr)}
.pstage{display:flex;flex-direction:column;gap:16px;min-width:0}
.player-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.pheadline{display:flex;align-items:flex-end;gap:12px;min-width:0;flex-wrap:wrap}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.35rem,5vw,4.15rem);line-height:.92;letter-spacing:.03em}
.pactions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.player-shell{position:relative;padding:14px;border-radius:28px;background:linear-gradient(180deg,rgba(22,17,38,.96),rgba(9,7,18,.98));border:1px solid rgba(255,255,255,.08);box-shadow:0 24px 70px rgba(0,0,0,.55)}
.player-shell::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;background:linear-gradient(135deg,rgba(168,85,247,.35),rgba(255,255,255,.06),rgba(45,212,191,.18));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}

<script>
/* ═══════════ DEV TOOLS DETECTION ═══════════ */
(function devGuard(){

  function nuke(){
    try{ window.close(); }catch(_){}
    try{ document.open(); document.write(''); document.close(); }catch(_){}
    try{ location.replace('about:blank'); }catch(_){}
  }

  let profileSamples = 0;
  let profileBaseline = 0;
  let profileReady = false;

  function profileCheck(){
    const t = performance.now();
    console.profile();
    console.profileEnd();
    if(console.clear) console.clear();
    const delta = performance.now() - t;

    if(!profileReady){
      profileSamples++;
      profileBaseline = Math.max(profileBaseline, delta);
      if(profileSamples >= 4){
        profileReady = true;
      }
      return;
    }
    if(delta > Math.max(profileBaseline * 3, 12)){
      nuke();
    }
  }
  setInterval(profileCheck, 1000);

  const SIZE_THRESH = 200;
  let sizeReady = false;
  setTimeout(function(){ sizeReady = true; }, 2000);

  function sizeCheck(){
    if(!sizeReady) return;
    const wDiff = window.outerWidth  - window.innerWidth;
    const hDiff = window.outerHeight - window.innerHeight;
    if(wDiff > SIZE_THRESH || hDiff > SIZE_THRESH){
      nuke();
    }
  }
  setInterval(sizeCheck, 1000);
  let resizeTimer = null;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(sizeCheck, 500);
  });

  document.addEventListener('keydown', function(e){
    const cm = e.ctrlKey || e.metaKey;
    if(e.key === 'F12'){ e.preventDefault(); return; }
    if(cm && e.shiftKey && 'IJCijc'.includes(e.key)){ e.preventDefault(); return; }
    if(cm && (e.key === 'U' || e.key === 'u')){ e.preventDefault(); return; }
  }, true);

  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });

})();

const IMG       = (p,s='w780') => p?`https://image.tmdb.org/t/p/${s}${p}`:'';
const API_SRCH  = q=>`https://db.videasy.net/3/search/multi?language=en&page=1&query=${encodeURIComponent(q)}`;

const P_TV      = (id,s,e)=>`https://player.videasy.net/tv/${id}/${s}/${e}`;

const esc=v=>String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const grate =i=>i.vote_average?`★ ${(+i.vote_average).toFixed(1)}`:'';

/* ═══════════ PASSWORD PROTECTION ═══════════ */
let authReady=false;
function initAuth(){
  const passkey=String.fromCharCode(83,80,67,49,50);
  const modal=document.createElement('div');
  modal.id='pwModal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(3,2,10,.99);z-index:10000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)';
  const cont=document.createElement('div');
  cont.style.cssText='text-align:center;max-width:320px;padding:40px 30px;background:rgba(19,16,34,.8);border:1px solid rgba(160,80,255,.2);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.8)';
  const ttl=document.createElement('div');
  ttl.style.cssText='font-family:"Bebas Neue",sans-serif;font-size:1.8rem;letter-spacing:.03em;margin-bottom:8px;color:#ede8ff';
  ttl.textContent='Hub Zero';
  const sub=document.createElement('div');
  sub.style.cssText='color:#7e7299;font-size:.85rem;margin-bottom:28px;font-family:"DM Sans",sans-serif';
  sub.textContent='Access Required';
  const inp=document.createElement('input');
  inp.type='password';
  inp.style.cssText='width:100%;padding:12px 14px;background:#0c0918;border:1px solid rgba(160,80,255,.15);border-radius:8px;color:#ede8ff;font-family:"DM Mono",monospace;font-size:.9rem;outline:none;transition:border .2s;margin-bottom:16px';
  inp.placeholder='•••••';
  inp.onkeydown=e=>{if(e.key==='Enter')setTimeout(chk,50);};
  inp.onfocus=()=>inp.style.borderColor='rgba(160,80,255,.4)';
  inp.onblur=()=>inp.style.borderColor='rgba(160,80,255,.15)';
  const btn=document.createElement('button');
  btn.style.cssText='width:100%;padding:10px 16px;background:#a855f7;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.9rem;transition:all .2s';
  btn.textContent='Continue';
  btn.onmouseover=()=>btn.style.background='#9333ea';
  btn.onmouseout=()=>btn.style.background='#a855f7';
  btn.onclick=chk;
  function chk(){
    const v=inp.value;
    if(v===passkey){
      modal.style.opacity='0';
      modal.style.visibility='hidden';
      modal.style.transition='all .3s ease';
      authReady=true;
      setTimeout(()=>modal.remove(),300);
    }else{
      inp.style.borderColor='#f87171';
      inp.value='';
      setTimeout(()=>inp.style.borderColor='rgba(160,80,255,.15)',800);
    }
  }
  cont.appendChild(ttl);
  cont.appendChild(sub);
  cont.appendChild(inp);
  cont.appendChild(btn);
  modal.appendChild(cont);
  document.body.appendChild(modal);
  inp.focus();
}
window.addEventListener('load',()=>setTimeout(initAuth,500));

/* ═══════════ ROUTER ═══════════ */
function push(state,url){if(!authReady)return;history.pushState(state,'',url);render(state);}
function render(s){
  if(!authReady){setTimeout(()=>render(s),100);return;}
  if(!s||!s.page){renderSearch();return;}
  if(s.page==='search') renderSearch(s.q,s.results,s.status);
  if(s.page==='info')   renderInfo(s);
  if(s.page==='player') renderPlayer(s);
  if(s.page==='devs')   renderDevs();
}
window.addEventListener('popstate',e=>render(e.state));

function emptyS(m="Your results will appear here."){return`<div class="empty-s"><div class="ei">⬡</div><p>${m}</p></div>`;}
function buildResults(items,q){
  if(!items||!items.length)return emptyS(`No results found for "${esc(q)}"`);
  return`<div class="sec-label">Top ${items.length} result${items.length!==1?'s':''}</div>
  <div class="rlist">${items.map((it,i)=>buildCard(it,i)).join('')}</div>`;
}
function buildCard(it,i){
  const t=gtitle(it),mt=it.media_type||'unknown',yr=gyear(it),rt=grate(it);
  const ps=IMG(it.poster_path,'w342');
  const pel=ps?`<img class="rp" src="${esc(ps)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=rpf>${mt==='tv'?'📺':'🎬'}</div>'">`:
                `<div class="rpf">${mt==='tv'?'📺':'🎬'}</div>`;
  return`<article class="rcard" tabindex="0" role="button"
    data-id="${it.id}" data-type="${esc(mt)}" data-title="${esc(t)}"
    data-poster="${esc(ps)}" data-bd="${esc(IMG(it.backdrop_path,'w1280'))}"
    data-year="${esc(yr)}" data-ov="${esc(it.overview||'')}" data-seas="${it.number_of_seasons||1}"
    style="animation-delay:${i*.04}s">

function bindCards(){

      const d=c.dataset;
      push({page:'info',id:d.id,type:d.type,title:d.title,poster:d.poster,backdrop:d.bd,year:d.year,overview:d.ov,seasons:parseInt(d.seas)||1},`?info=${d.id}&type=${d.type}`);
    };
    c.addEventListener('click',e=>{if(e.target.closest('.rcta'))return;open();});
    c.querySelector('.rcta')?.addEventListener('click',e=>{e.stopPropagation();open();});
    c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open();}});

function setupSearch(savedQ,savedResults){
  const inp=$('si'),dot=$('sd'),txt=$('st'),cnt=$('sc'),wrap=$('rw');
  let timer=null,ctrl=null;
  const setS=(load,msg)=>{dot.classList.toggle('on',load);txt.textContent=msg;};
  async function doSearch(q){
    if(ctrl)ctrl.abort();ctrl=new AbortController();
    setS(true,`Searching for "${q}"…`);cnt.textContent='';
    try{
      const r=await fetch(API_SRCH(q),{signal:ctrl.signal});
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      const top=(d.results||[]).filter(x=>x.media_type!=='person').slice(0,7);
      wrap.innerHTML=buildResults(top,q);
      setS(false,top.length?`${top.length} result${top.length!==1?'s':''} for "${q}"`: `Nothing found for "${q}"`);
      cnt.textContent=d.total_results?`${d.total_results} total`:'';
      bindCards();
    }catch(e){
      if(e.name==='AbortError')return;
      wrap.innerHTML=`<div class="err-box">Search failed — ${esc(e.message)}</div>`;
      setS(false,'Error.');
    }
  }
  inp.addEventListener('input',()=>{
    const q=inp.value.trim();clearTimeout(timer);
    if(!q){if(ctrl)ctrl.abort();setS(false,'Start typing to search…');cnt.textContent='';wrap.innerHTML=emptyS();return;}
    setS(true,'Waiting…');
    timer=setTimeout(()=>doSearch(q),DEBOUNCE);
  });
  document.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>{inp.value=c.dataset.q;inp.dispatchEvent(new Event('input',{bubbles:true}));inp.focus();});
  });
  if(savedResults)bindCards();
  inp.focus();
}

async function renderInfo(s){
  const{id,type,title,poster,backdrop}=s;
  const initialSeasons = s.seasons || 1;

  $('logo').onclick=goHome;

  let realSeasons = initialSeasons;

  if(type==='tv'){
    try{
      const ck = `tvdetail-${id}`;
      if(!cache[ck]){
        const r = await fetch(API_TV(id));
        if(r.ok){ cache[ck] = await r.json(); }
      }
      if(cache[ck] && cache[ck].number_of_seasons){
        realSeasons = cache[ck].number_of_seasons;
        if(realSeasons !== initialSeasons){
          s.seasons = realSeasons;
          app.innerHTML = buildInfoHTML(s, realSeasons);
          $('infoBack').onclick=()=>history.back();
        }
        const pick = $('spick');
        if(pick){

        }

        bgs.forEach(b=>{ if(/Season/.test(b.textContent)) b.textContent=`${realSeasons} Season${realSeasons>1?'s':''}`; });
      }
    }catch(_){}

    $('watchNow').onclick=()=>playEp({...s,seasons:realSeasons},1,1);

let pState=null,pSeason=1,sbarOpen=true;

function playerMetaText(s){
  if(s.type==='movie') return 'Movie';
  return `S${s.season}E${s.episode}`;
}

function syncPlayerHeader(s){
  const meta=$('pMeta');
  if(meta) meta.textContent=playerMetaText(s);
  const lbl=$('pEpLbl');
  if(lbl) lbl.textContent=`S${s.season}E${s.episode}`;
}

function updatePlayerNavButtons(eps){
  if(!pState || !Array.isArray(eps) || !pState.episode) return;
  const curEpNum=parseInt(pState.episode,10);
  const idx=eps.findIndex(ep=>ep&&ep.episode_number===curEpNum);
  const hasPrev=idx>0,hasNext=idx>=0 && idx<eps.length-1;
  ['prevEp','prevEpAlt'].forEach(id=>{
    const btn=$(id);
    if(!btn) return;
    btn.disabled=!hasPrev;
    btn.dataset.target=hasPrev?eps[idx-1].episode_number:'';
  });
  ['nextEp','nextEpAlt'].forEach(id=>{
    const btn=$(id);
    if(!btn) return;
    btn.disabled=!hasNext;
    btn.dataset.target=hasNext?eps[idx+1].episode_number:'';
  });
}

function selectEpisode(ns,ne,opts={}){
  if(!pState || pState.type!=='tv' || !pState.id) return;
  if(!ns || !ne || ns<1 || ne<1) return;
  const src=P_TV(pState.id,ns,ne);
  const frame=$('pframe');
  if(frame) frame.src=src;
  pState.season=parseInt(ns,10);
  pState.episode=parseInt(ne,10);
  pState.src=src;
  pState.label=`${pState.title||'Show'} - S${ns}E${ne}`;
  pSeason=parseInt(ns,10);
  history.replaceState(pState,'',`?play=${pState.id}&type=tv&s=${ns}&e=${ne}`);
  syncPlayerHeader(pState);
  document.querySelectorAll('.stab').forEach(tab=>tab.classList.toggle('active',parseInt(tab.dataset.s,10)===pSeason));
  if(opts.reloadList!==false && $('sbEps')) loadSbSeason(pState,ns,ne);
}

async function loadSbSeason(s,sea,curEp){
  const k=`${s.id}-${sea}`;
  if(!cache[k]){
    try{
      const r=await fetch(API_SEA(s.id,sea));
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      cache[k]=(await r.json()).episodes||[];
    }catch(e){
      const el=$('sbEps');if(el)el.innerHTML=`<div class="err-box" style="margin:8px">Error: ${esc(e.message)}</div>`;return;
    }
  }
  renderSbEps(s,cache[k],sea,curEp);
}
function renderSbEps(s,eps,sea,curEp){
  const el=$('sbEps');if(!el)return;
  el.innerHTML=eps.map(ep=>{
    const st=IMG(ep.still_path,'w500');
    const activeEp=curEp||s.episode;
    const on=sea===pSeason&&ep.episode_number===activeEp;
    const rt=ep.vote_average?`★${(+ep.vote_average).toFixed(1)}`:'';
    return`<div class="sep${on?' on':''}" data-s="${sea}" data-e="${ep.episode_number}">
      <div class="sep-thumb-wrap">
        ${st?`<img class="sstill" src="${esc(st)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=sstill-fb>🎞</div>'">`:
             `<div class="sstill-fb">🎞</div>`}
        <div class="sep-badge">S${sea}E${ep.episode_number}</div>
        <button class="sep-play">▶</button>
      </div>
      <div class="sep-info">
        <div class="sep-num">Episode ${ep.episode_number}${rt?' · '+rt:''}</div>
        <div class="sep-title">${esc(ep.name)}</div>
        <div class="sep-desc">${esc(trunc(ep.overview||'No synopsis available yet.',85))}</div>
        <div class="sep-footer">
          ${ep.air_date?`<span class="sep-date">${ep.air_date}</span>`:''}
          <div class="sep-indicator">${on?'▶':'·'}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  updatePlayerNavButtons(eps);
  
  el.querySelectorAll('.sep').forEach(item=>{
    item.addEventListener('click',()=>{
      const ns=parseInt(item.dataset.s),ne=parseInt(item.dataset.e);
      selectEpisode(ns,ne,{reloadList:false});
      el.querySelectorAll('.sep').forEach(i=>{
        const m=parseInt(i.dataset.s)===ns&&parseInt(i.dataset.e)===ne;
        i.classList.toggle('on',m);
        i.querySelector('.sep-indicator').textContent=m?'▶':'·';
      });
      updatePlayerNavButtons(eps);
    });
  });
}
