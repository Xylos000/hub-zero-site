<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Zero — Official Domains</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f2efe7;
    --muted: #6e6c66;
    --accent: #d4ff3a;
    --line: rgba(242,239,231,0.1);
    --ease: cubic-bezier(0.65, 0.05, 0.1, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Syne', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    padding: 20px;
  }
  .container {
    text-align: center;
    max-width: 500px;
    width: 100%;
    border: 1px solid var(--line);
    padding: 60px 40px;
    background: #111;
  }
  h1 {
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 40px;
    text-transform: uppercase;
  }
  h1 span {
    color: var(--accent);
  }
  .domain-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 40px;
  }
  .domain-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.05em;
    color: var(--fg);
    padding: 16px;
    border: 1px solid var(--line);
    background: #0a0a0a;
    transition: all 0.4s var(--ease);
  }
  .domain-item:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 10px 30px rgba(212,255,58,0.05);
  }
  .back-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.3s;
  }
  .back-link:hover {
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Official <span>Domains</span></h1>
    <ul class="domain-list">
      <li class="domain-item">hub-zero.site</li>
      <li class="domain-item">residential-6k3h.onrender.com</li>
    </ul>
    <a href="../" class="back-link">← Go Back</a>
  </div>
</body>
</html>
